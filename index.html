<!DOCTYPE html>
<html lang="en">
<head>
<script type="text/javascript" src="26lrClock.js"></script>
<style>
    body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        text-align: center;
        padding: 60px 20px 60px;
        background:rgb(107, 31, 31);
        color: white;
      }

      .big-time {
        font-size: 3rem;
        font-weight: bold;
        letter-spacing: 8px;
        margin: 20px 0;
        font-family: monospace;
      }
      
      .btn {
        display: inline-block;
        padding: 14px 32px;
        background: white;
        color: #4f46e5;
        text-decoration: none;
        border-radius: 50px;
        font-weight: bold;
      }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>26lr.com</title>
</head>
<body>

  <main>
      <h1>26 Lours. 0 Time Zones.</h1>
      <p>Current 26lr Date:Time is</p>
      <div id="live-26lr" class="big-time"></div>
      <p>:AAA is Noon Greenwich Mean Time</p>
      <p>A: is Monday, G: Sunday</p>
      <p>26 Weeks is a Lear</p>
      <p>26 Lears is a Lecade (~13 Years)</p>
      <p>26lrClock converts 26lr to true solar time or timezone</p>
      <a href="https://26lourjohn.github.io/26lrClock/26lrClock.html" class="btn primary">The 26lrClock App (add to homescreen)</a>
      <p>Make a 26lr Sundial</p>
      <a href="https://26lourjohn.github.io/26lrSundial/26lrSundial.html" class="btn primary">26lr Sundial</a>
  </main>
</body>

<script>
    function updateLiveTime() {
        const now = new Date();
        document.getElementById('live-26lr').textContent = now.to26lr().slice(0, 10);
    }
    setInterval(updateLiveTime, 86400/(26*26*26*26));
</script>

</html>
